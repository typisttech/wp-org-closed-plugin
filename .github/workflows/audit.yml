name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '16 3 * * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  php:
    uses: typisttech/.github/.github/workflows/audit-php.yml@84a542186b401cc272eeec5c9c077c3cb3c910e2 # v6.1.0

  go:
    uses: typisttech/.github/.github/workflows/audit-go.yml@425aa142db9be374681ec7380bb263eecd1b1513 # v6.1.1
