name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '16 3 * * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  php:
    uses: typisttech/.github/.github/workflows/audit-php.yml@66b52ec4effdadb226ce10665c4a7e201c6a53c6 # v6.1.3

  go:
    uses: typisttech/.github/.github/workflows/audit-go.yml@669be3950e61773155dddbf4822ee9ed82838393 # v6.1.2
