name: Test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions: {}

jobs:
  php-matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.php-matrix.outputs.versions }}
      highest: ${{ steps.php-matrix.outputs.highest }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          sparse-checkout: composer.json
          sparse-checkout-cone-mode: false

      - uses: typisttech/php-matrix-action@65bbdaffdb0be005bda1ee30b7815b8dbf8b00d1 # v3.0.1
        id: php-matrix

  test:
    needs: php-matrix
    strategy:
      matrix:
        suite: &suite [unit, feature]
        php-version: ${{ fromJSON(needs.php-matrix.outputs.versions) }}
        dependency-versions: [highest, lowest]
        coverage: ['none']
        include:
          - suite: unit
            php-version: ${{ needs.php-matrix.outputs.highest }}
            dependency-versions: locked
            coverage: xdebug
          - suite: feature
            php-version: ${{ needs.php-matrix.outputs.highest }}
            dependency-versions: locked
            coverage: xdebug

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php-version }}
          coverage: ${{ matrix.coverage }}

      - uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0
        with:
          dependency-versions: ${{ matrix.dependency-versions }}

      - run: composer "test:${SUITE}" -- --ci --coverage-clover "coverage-${SUITE}.xml"
        if: matrix.coverage == 'xdebug'
        env:
          SUITE: ${{ matrix.suite }}

      - run: composer "test:${SUITE}" -- --ci
        if: matrix.coverage != 'xdebug'
        env:
          SUITE: ${{ matrix.suite }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.coverage == 'xdebug'
        with:
          name: coverage-${{ matrix.suite }}
          path: coverage-${{ matrix.suite }}.xml

  codecov:
    needs: test
    strategy:
      matrix:
        suite: *suite
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-${{ matrix.suite }}

      - uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          use_oidc: true
          fail_ci_if_error: true
          disable_search: true
          files: coverage-${{ matrix.suite }}.xml
          flags: ${{ matrix.suite }}

  e2e:
    name: e2e (PHP ${{ matrix.php-version }}, Composer ${{ matrix.composer-version }})
    needs: php-matrix
    strategy:
      matrix:
        php-version: ${{ fromJSON(needs.php-matrix.outputs.versions) }}
        composer-version: ['2.8', '2.9']
    runs-on: ubuntu-latest
    env:
      GOFLAGS: '-mod=mod'
    steps:
      - run: sudo apt-get update
      - run: sudo apt-get install --no-install-recommends --yes subversion

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:${{ matrix.composer-version }}
          coverage: 'none'

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - run: go test -count=1 -shuffle=on ./...

  wait-for-all-tests:
    needs:
      - test
      - e2e
    runs-on: ubuntu-latest
    steps:
      - run: exit 0
